<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BlackQueens Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/custom_style.css">
</head>

<body class="loading">
    <!-- 1. Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- 2. Main Content Area -->
    <main class="auth-main">
        <div class="container">
            <!-- Brand Header -->
            <div class="brand-header">
                <img src="assets/images/logo.svg" alt="BlackQueens Logo" class="brand-logo">
                <span class="brand-name">BlackQueens</span>
            </div>

            <!-- Success View -->
            <div class="card card-success">
                <h1>BlackQueens Login Successful</h1>
                <p>Authentication was successful! You can now close this tab/window and return to the app.</p>
                <div class="timer">
                    <span class="timer-dot"></span>
                    <span id="msg">Process Completed.</span>
                </div>
            </div>

            <!-- Error View -->
            <div class="card card-error">
                <h1>Authentication failed</h1>
                <div id="error-details" class="detail">Something went wrong.</div>
            </div>

            <!-- Loading View -->
            <div class="card card-loading">
                <div class="loading-spinner-wrap">
                    <div class="spinner"></div>
                </div>
                <h1>Verifying details</h1>
                <p>Completing authentication process. Please hold on.</p>
            </div>
        </div>
    </main>

    <!-- 3. Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- 4. Loader Script to load Header/Footer -->
    <script src="assets/js/loader.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.substring(1));

        const error = urlParams.get('error') || hashParams.get('error');
        const errorDesc = urlParams.get('error_description') || hashParams.get('error_description') || urlParams.get('error_msg') || hashParams.get('error_msg');
        const code = urlParams.get('code') || hashParams.get('code');
        const accessToken = urlParams.get('access_token') || hashParams.get('access_token');

        // සාර්ථක වුණොත් Success Card එක පෙන්වා මෙතැනම නතර කරයි
        function showSuccessState() {
            document.body.className = 'success';
        }

        // අසාර්ථක වුණොත් Error Card එක පෙන්වා මෙතැනම නතර කරයි
        function showErrorState(msg) {
            document.body.className = 'error';
            document.getElementById('error-details').textContent = msg;
        }

        // 1. මුලින්ම Error එකක් ඇවිත් ඇත්නම්
        if (error || errorDesc) {
            const cleanError = errorDesc || error || 'Authentication failed.';
            showErrorState(cleanError);

        // 2. Auth Code (PKCE) එකක් ලැබී ඇත්නම්
        } else if (code) {
            showSuccessState();

        // 3. Access Token එකක් ලැබී ඇත්නම්
        } else if (accessToken) {
            showSuccessState();

        // 4. මුලින්ම මුකුත් නැත්නම් (Hash Params පරක්කු වී ලෝඩ් වන නිසා තත්පරයකට පසු නැවත චෙක් කරයි)
        } else {
            setTimeout(() => {
                const refreshedHashParams = new URLSearchParams(window.location.hash.substring(1));
                const secondAccessToken = refreshedHashParams.get('access_token');
                const secondError = refreshedHashParams.get('error') || refreshedHashParams.get('error_description');

                if (secondAccessToken) {
                    showSuccessState();
                } else if (secondError) {
                    showErrorState(secondError);
                } else {
                    showErrorState('No authentication response received.');
                }
            }, 1000);
        }
    </script>
</body>

</html>
