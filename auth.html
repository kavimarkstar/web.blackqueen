<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BlackQueens Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/custom_style.css">
</head>

<body class="loading">
    <!-- 1. Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- 2. Main Content Area -->
    <main class="auth-main">
        <div class="container">
            <!-- Brand Header (Logo top, Brand name bottom) -->
            <div class="brand-header">
                <img src="assets/images/logo.svg" alt="BlackQueens Logo" class="brand-logo">
                <span class="brand-name">BlackQueens</span>
            </div>

            <!-- Success View -->
            <div class="card card-success">
                <h1>BlackQueens Login Successful</h1>
                <p>Authentication was successful. Connecting you back to the app...</p>
                <div class="timer">
                    <span class="timer-dot"></span>
                    <span id="msg">Redirecting to app in <strong id="c">3</strong>s...</span>
                </div>
            </div>

            <!-- Error View -->
            <div class="card card-error">
                <h1>Authentication failed</h1>
                <div id="error-details" class="detail">Something went wrong.</div>
            </div>

            <!-- Loading View -->
            <div class="card card-loading">
                <div class="loading-spinner-wrap">
                    <div class="spinner"></div>
                </div>
                <h1>Verifying details</h1>
                <p>Completing authentication process. Please hold on.</p>
            </div>
        </div>
    </main>

    <!-- 3. Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- 4. Loader Script to load Header/Footer -->
    <script src="assets/js/loader.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.substring(1));

        const error = urlParams.get('error') || hashParams.get('error');
        const errorDesc = urlParams.get('error_description') || hashParams.get('error_description') || urlParams.get('error_msg') || hashParams.get('error_msg');
        const code = urlParams.get('code') || hashParams.get('code');
        const accessToken = urlParams.get('access_token') || hashParams.get('access_token');

        // Flutter App එකේ local callback server URL එක
        const FLUTTER_LOCAL_SERVER = 'http://localhost:3000';

        function redirectToApp(targetUrl) {
            // සාර්ථක වුණොත් success state එක UI එකේ තත්පරයක් පෙන්වලා redirect කරනවා
            document.body.className = 'success';
            let t = 2;
            const el = document.getElementById('c');
            if (el) el.textContent = t;

            const iv = setInterval(() => {
                t--;
                if (el) el.textContent = t;
                if (t <= 0) {
                    clearInterval(iv);
                    window.location.replace(targetUrl);
                }
            }, 1000);
        }

        // 1. Error එකක් ආවොත් ක්‍රියාත්මක වන කොටස
        if (error || errorDesc) {
            document.body.className = 'error';
            const cleanError = errorDesc || error || 'Authentication failed.';
            document.getElementById('error-details').textContent = cleanError;
            
            // Flutter app එකටත් error එක pass කරනවා error page එක පෙන්වන්න
            setTimeout(() => {
                window.location.replace(`${FLUTTER_LOCAL_SERVER}/?error_description=${encodeURIComponent(cleanError)}`);
            }, 1500);

        // 2. Auth Code (PKCE) එකක් ලැබුණොත් ක්‍රියාත්මක වන කොටස (මේක තමයි ප්‍රධානම එක)
        } else if (code) {
            redirectToApp(`${FLUTTER_LOCAL_SERVER}/?code=${code}`);

        // 3. Access Token (Implicit Flow) එකක් ලැබුණොත් ක්‍රියාත්මක වන කොටස
        } else if (accessToken) {
            redirectToApp(`${FLUTTER_LOCAL_SERVER}/?code=${accessToken}`); // හෝ local server එකට access token එක direct pass කරනවා

        // 4. මුලින්ම මුකුත් නැත්නම් (සමහර වෙලාවට Hash parameters load වෙන්න ඩිංගක් පරක්කු වෙනවා)
        } else {
            setTimeout(() => {
                const refreshedHashParams = new URLSearchParams(window.location.hash.substring(1));
                const secondAccessToken = refreshedHashParams.get('access_token');
                const secondError = refreshedHashParams.get('error') || refreshedHashParams.get('error_description');

                if (secondAccessToken) {
                    redirectToApp(`${FLUTTER_LOCAL_SERVER}/?code=${secondAccessToken}`);
                } else if (secondError) {
                    document.body.className = 'error';
                    document.getElementById('error-details').textContent = secondError;
                    setTimeout(() => {
                        window.location.replace(`${FLUTTER_LOCAL_SERVER}/?error_description=${encodeURIComponent(secondError)}`);
                    }, 1500);
                } else {
                    document.body.className = 'error';
                    document.getElementById('error-details').textContent = 'No authentication response received from Supabase.';
                }
            }, 1000); // තත්පර 1ක delay එකකින් නැවත පරීක්ෂා කරයි
        }
    </script>
</body>

</html>
